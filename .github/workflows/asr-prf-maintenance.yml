name: ASR and PRF maintenance

on:
  push:
    branches:
      - AIRAC-2605
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: AIRAC-2605

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run maintenance script
        run: python scripts/asr_prf_maintenance.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-maintain ASR and PRF files"
            git push origin AIRAC-2605
          fi
