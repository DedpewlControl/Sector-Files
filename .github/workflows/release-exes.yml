name: Release Tools

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write installer build info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Set-Content -Path "scripts/installer/build_info.py" -Value "BUILD_COMMIT = '$shortSha'"
          Add-Content -Path "scripts/installer/build_info.py" -Value "BUILD_BRANCH = '${{ github.ref_name }}'"

      - name: Build Installer
        working-directory: scripts/installer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pyinstaller --onefile --noupx --windowed --icon ProfileConfigurator.ico --add-data "ProfileConfigurator.ico;." --version-file version_info.txt --name "Installer" app.py

      - name: Build Profile Configurator
        working-directory: scripts/profileconfigurator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pyinstaller --onefile --noupx --windowed --icon ProfileConfigurator.ico --add-data "ProfileConfigurator.ico;." --version-file version_info.txt --name "ProfileConfigurator" ProfileConfigurator.py

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/installer/dist/Installer.exe
            scripts/profileconfigurator/dist/ProfileConfigurator.exe