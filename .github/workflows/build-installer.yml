name: Build Installer EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write build info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Set-Content -Path "scripts/installer/build_info.py" -Value "BUILD_COMMIT = '$shortSha'"
          Add-Content -Path "scripts/installer/build_info.py" -Value "BUILD_BRANCH = '${{ github.ref_name }}'"

      - name: Install dependencies
        working-directory: scripts/installer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Installer folder
        working-directory: scripts/installer
        run: |
          pyinstaller --onedir --noupx --windowed --icon ProfileConfigurator.ico --add-data "ProfileConfigurator.ico;." --version-file version_info.txt --name "Installer" app.py

      - name: Zip Installer
        shell: pwsh
        run: |
          Compress-Archive -Path "scripts/installer/dist/Installer/*" -DestinationPath "Installer.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: Installer.zip