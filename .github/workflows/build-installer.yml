name: Build Installer EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Write build info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          Set-Content -Path "scripts/installer/build_info.py" -Value "BUILD_COMMIT = '$shortSha'"
          Add-Content -Path "scripts/installer/build_info.py" -Value "BUILD_BRANCH = '${{ github.ref_name }}'"

      - name: Install dependencies
        working-directory: scripts/installer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        working-directory: scripts/installer
        run: |
          pyinstaller --onefile --windowed --name "CoFrance Installer" app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoFrance-Installer
          path: scripts/installer/dist/CoFrance Installer.exe